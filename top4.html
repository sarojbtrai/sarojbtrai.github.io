<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best 4 Crypto Faucets – Ad</title>
    <style>
        /* ───── RESET ───── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #0b0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ───── AD CONTAINER – no padding, no margins ───── */
        .ad {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            max-width: 1024px;
            aspect-ratio: 2 / 1;
            background: #0b0e1a;
            gap: 0;
        }

        /* ───── EACH PANEL – clickable <a> ───── */
        .panel {
            position: relative;
            overflow: hidden;
            background: #0f1629;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .panel:hover img {
            transform: scale(1.03);
        }

        /* ───── TEXT OVERLAY – tighter, semi-transparent ───── */
        .panel .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 16px 14px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(2px);
            color: #f0f4ff;
            pointer-events: none;
            text-align: center;
        }

        .panel .overlay .name {
            font-weight: 700;
            font-size: clamp(1rem, 2vw, 1.8rem);
            letter-spacing: -0.02em;
            margin-bottom: 2px;
            color: #fff;
        }

        .panel .overlay .name .gold {
            color: #f7c948;
        }

        .panel .overlay .detail {
            font-size: clamp(0.65rem, 1vw, 1rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.02em;
            line-height: 1.4;
        }

        .panel .overlay .detail strong {
            color: #f7c948;
            font-weight: 600;
        }

        /* ───── RESPONSIVE: stack vertically on mobile ───── */
        @media (max-width: 640px) {
            .ad {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, 1fr);
                aspect-ratio: auto;
                max-height: 80vh;
                min-height: 420px;
                width: 100%;
                gap: 2px;
                /* tiny gap to separate panels on mobile */;
            }

            .panel .overlay {
                padding: 6px 12px 12px;
            }

            .panel .overlay .name {
                font-size: clamp(1rem, 4vw, 1.4rem);
            }

            .panel .overlay .detail {
                font-size: clamp(0.65rem, 2vw, 0.9rem);
            }
        }

        @media (max-width: 400px) {
            .ad {
                max-height: 70vh;
                min-height: 320px;
            }
            .panel .overlay {
                padding: 4px 10px 10px;
            }
            .panel .overlay .name {
                font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            }
            .panel .overlay .detail {
                font-size: clamp(0.55rem, 1.8vw, 0.7rem);
            }
        }
    </style>
</head>
<body>

    <!-- ─── AD: 4 CLICKABLE PANELS JOINED ─── -->
    <div class="ad">

        <!-- 1. Earnbitsun -->
        <a href="https://earnbitsun.club?ref=NQJTQYSZ" target="_blank" rel="noopener noreferrer" class="panel">
            <img

            <div class="overlay">

            </div>
        </a>

            <img
            src="https://freeltc.online/assets/images/logo.png"

            />
            <div class="overlay">
                <div class="name">Freeltc</div>

            </div>
        </a>

        <!-- 3. Viefaucet -->

            <img
            src="https://allfaucet.buzz/images/vie.png"

            </div>
        </a>

        <!-- 4. Cointapper -->
        <a href="https://cointapper.io/?r=998" target="_blank" rel="noopener noreferrer" class="panel">
            <img
            src="https://cointapper.io/assets/images/logo.png"

    </div>

</body>
</html>
